<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gallery — Nur Allysa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #57b9ff;
            --muted: #5b6b72;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Poppins, system-ui;
            background: linear-gradient(135deg, #f6fbff 0%, #eaf7ff 40%, #fdf6ff 100%);
            color: #06283D;
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(6px);
            border-bottom: 1px solid rgba(9, 30, 63, 0.05);
            z-index: 30;
        }

        .nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
        }

        .nav a {
            padding: 8px 12px;
            border-radius: 10px;
            text-decoration: none;
            color: inherit;
            font-weight: 600;
        }

        .nav a.active {
            background: var(--accent);
            color: #fff;
        }

        .main {
            max-width: 1200px;
            margin: 48px auto;
            padding: 20px;
        }

        h2 {
            color: var(--accent);
            text-align: center;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
        }

        .card {
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 8px 20px rgba(6, 40, 61, 0.08);
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(87, 185, 255, 0.5);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .lightbox img {
            max-width: 92%;
            max-height: 92%;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        #music-btn {
            position: fixed;
            right: 18px;
            bottom: 18px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            z-index: 50;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="nav">
            <div style="font-weight:700">NA — Nur Allysa</div>
            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="skills.html">Skills</a>
                <a href="achievements.html">Achievements</a>
                <a href="gallery.html" class="active">Gallery</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <h2>Gallery</h2>
        <div class="grid">
            <div class="card" onclick="openLightbox('o.jpg')"><img src="o.jpg" alt=""></div>
            <div class="card" onclick="openLightbox('band2.jpg')"><img src="band2.jpg" alt=""></div>
            <div class="card" onclick="openLightbox('band3.jpg')"><img src="band3.jpg" alt=""></div>
            <div class="card" onclick="openLightbox('band4.jpg')"><img src="band4.jpg" alt=""></div>
            <div class="card" onclick="openLightbox('band5.jpg')"><img src="band5.jpg" alt=""></div>
        </div>
    </main>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" alt="">
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="Fade-Into-You.mp3" type="audio/mpeg">
    </audio>
    <button id="music-btn">Play</button>

    <script>
        const music = document.getElementById('bg-music'),
            btn = document.getElementById('music-btn');
        let playing = false;

        // Maintain playback state
        if (localStorage.getItem('musicState') === 'playing') {
            music.play().then(() => { playing = true; btn.textContent = 'Pause' }).catch(() => { });
        } else btn.textContent = 'Play';

        btn.addEventListener('click', async () => {
            if (!playing) {
                await music.play(); playing = true;
                btn.textContent = 'Pause'; localStorage.setItem('musicState', 'playing');
            } else {
                music.pause(); playing = false;
                btn.textContent = 'Play'; localStorage.setItem('musicState', 'paused');
            }
        });

        // Lightbox
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>
</body>

</html>
